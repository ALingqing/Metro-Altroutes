name: metro-altroutes
version: 1.0.0
main: top.chenray.metroaltroutes.MetroAltroutes
api-version: 1.20
description: Metro附属插件 - 线路暂停运营管理、替代路线推荐与乘车拦截
author: ALINGQING,ANGUSHUSHU,LONELYXIYA

depend:
  - Metro

commands:
  metroaltroutes:
    description: Metro线路运营管理命令
    aliases: [m]
    usage: |
      §e/m line setstatus <线路ID> <normal|suspended|maintenance> §7- 设置线路运营状态
      §e/m line setsuspensionmsg <线路ID> <消息> §7- 设置暂停运营公告
      §e/m line setaltroute <线路ID> <替代线路ID> §7- 设置替代路线
      §e/m line clearaltroute <线路ID> §7- 清除替代路线
      §e/m line status <线路ID> §7- 查看线路运营状态
      §e/m line info <线路ID> §7- 查看线路详细信息
      §e/m line list §7- 列出全部线路状态
      §e/m reload §7- 重载插件配置

permissions:
  metroaltroutes.admin:
    description: 允许管理Metro线路运营状态
    default: op
  metroaltroutes.use:
    description: 允许查看Metro线路信息
    default: true
