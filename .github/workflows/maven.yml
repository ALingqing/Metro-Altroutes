# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: build

on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Cache Metro
        id: cache-metro
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/cubexmc/metro
          key: metro-1.1.7

      - name: Build Metro
        if: steps.cache-metro.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --single-branch https://github.com/CubeX-MC/Metro.git /tmp/Metro
          cd /tmp/Metro
          mvn install -DskipTests -q

      - run: mvn -B package --file pom.xml

      - uses: actions/upload-artifact@v4
        with:
          name: metro-altroutes
          path: target/metro-altroutes.jar
          if-no-files-found: error
          retention-days: 7

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/metro-altroutes.jar
          generate_release_notes: true

